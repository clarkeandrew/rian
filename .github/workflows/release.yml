name: Release

# Automated, Conventional-Commit-driven releases.
#
# On a push to main, svu computes the next SemVer (staying in 0.x via --v0). If a
# release is warranted, the workflow tags it and runs GoReleaser to build the
# archives + checksums and push the multi-arch GHCR image, and creates a DRAFT
# GitHub Release for review. A tag pushed by GITHUB_TOKEN does NOT retrigger
# workflows, so tagging and building happen in this one job (no dead tags).
#
# workflow_dispatch builds the tag already at HEAD (used for the initial v0.1.0
# release and any manual re-run) without computing or creating a new tag.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create tags and the GitHub Release
  packages: write # push the image to GHCR

concurrency:
  group: release
  cancel-in-progress: false

env:
  SVU_VERSION: v3.4.1
  GORELEASER_VERSION: v2.4.4

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - name: Install svu
        run: go install "github.com/caarlos0/svu/v3@${SVU_VERSION}"

      - name: Decide release version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Build the tag currently at HEAD (e.g. the seeded v0.1.0). Fail loudly
            # if HEAD is not tagged, rather than silently building a snapshot.
            if ! TAG="$(git describe --tags --exact-match 2>/dev/null)"; then
              echo "::error::workflow_dispatch requires HEAD to be tagged (e.g. seed v0.1.0 first)"
              exit 1
            fi
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "make_tag=false" >> "$GITHUB_OUTPUT"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
          else
            CURRENT="$(svu current 2>/dev/null || echo v0.0.0)"
            NEXT="$(svu next --v0)"
            echo "current=$CURRENT next=$NEXT"
            if [ "$CURRENT" = "$NEXT" ]; then
              echo "release=false" >> "$GITHUB_OUTPUT"
            else
              echo "release=true" >> "$GITHUB_OUTPUT"
              echo "make_tag=true" >> "$GITHUB_OUTPUT"
              echo "version=$NEXT" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: No release needed
        if: steps.ver.outputs.release != 'true'
        run: echo "No qualifying commits since the last tag — skipping release."

      - name: Create and push tag
        if: steps.ver.outputs.release == 'true' && steps.ver.outputs.make_tag == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.version }}" -m "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - name: Set up QEMU
        if: steps.ver.outputs.release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.ver.outputs.release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.ver.outputs.release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser
        if: steps.ver.outputs.release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
