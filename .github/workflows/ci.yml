name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o rian ./cmd/rian

      - name: Assert static binary
        run: |
          file rian
          if ldd rian 2>&1 | grep -qv 'not a dynamic executable'; then
            echo "ERROR: rian is dynamically linked (cgo leaked in?)"
            ldd rian || true
            exit 1
          fi
          echo "OK: rian is statically linked"
