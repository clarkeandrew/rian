name: "[Docs] Publish Pages"

# Deploys the static site in site/ to GitHub Pages.
#
# One-time setup (the Actions token cannot do this itself): in the repository,
# go to Settings -> Pages -> "Build and deployment" -> Source: GitHub Actions.
# Pages on a private repo needs a paid plan; making the repo public enables it
# on the free plan (and is required for the download links to work for visitors).
# After that, this workflow deploys on every push that touches site/.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/publish-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
