# Local databases for the end-to-end / Flyway-parity tests.
#
#   docker compose up -d
#   RIAN_E2E_POSTGRES_URL='jdbc:postgresql://localhost:5432/app' \
#   RIAN_E2E_MYSQL_URL='jdbc:mysql://localhost:3306/app' \
#     go test -tags e2e ./test/e2e/...
#
# See .github/workflows/e2e-tests.yml for the full Flyway -> Rian handoff test.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rian
      POSTGRES_PASSWORD: rian
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rian -d app"]
      interval: 2s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: rian
      MYSQL_PASSWORD: rian
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 3s
      timeout: 3s
      retries: 30
