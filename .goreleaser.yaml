# GoReleaser configuration for Rian.
# Build invariant: CGO_ENABLED=0 so every artifact is a static binary.
version: 2

project_name: rian

before:
  hooks:
    - go mod tidy

builds:
  - id: rian
    main: ./cmd/rian
    binary: rian
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: rian
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# Multi-arch container image. GoReleaser builds one image per arch from the
# prebuilt static binary, then docker_manifests stitches them into a single
# multi-arch tag. Image path is hardcoded lowercase (GHCR rejects uppercase).
dockers:
  - id: rian-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/clarkeandrew/rian:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/clarkeandrew/rian"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: rian-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/clarkeandrew/rian:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/clarkeandrew/rian"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/clarkeandrew/rian:{{ .Version }}"
    image_templates:
      - "ghcr.io/clarkeandrew/rian:{{ .Version }}-amd64"
      - "ghcr.io/clarkeandrew/rian:{{ .Version }}-arm64"
  - name_template: "ghcr.io/clarkeandrew/rian:latest"
    image_templates:
      - "ghcr.io/clarkeandrew/rian:{{ .Version }}-amd64"
      - "ghcr.io/clarkeandrew/rian:{{ .Version }}-arm64"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  # Auto-publish: the release goes live immediately with its archives, rather
  # than waiting as a draft. The version tag is created automatically by the
  # release workflow, so each push of qualifying commits ships a visible release.
  draft: false
  prerelease: auto
